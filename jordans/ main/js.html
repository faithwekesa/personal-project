<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ4 Retro | Infinite Colorways</title>
    <link rel="stylesheet" href="js.css">
</head>
<body>

    <header class="global-header">
        <div class="header-inner">
            <div class="brand-logo">Flight Club</div>
            <div class="product-badge">Air Jordan IV Retro</div>
        </div>
    </header>

    <main class="showcase-container">
        
        <div class="image-presentation-side">
            <div class="glow-backdrop" id="glow-ambient"></div>
            <img id="sneaker-display" src="" alt="Air Jordan 4">
        </div>

        <div class="product-details-side">
            <div class="details-content-box">
                <span class="collection-tag">Heritage Edition</span>
                <h1 id="sneaker-title">Loading...</h1>
                <p id="sneaker-desc">...</p>
                
                <div class="spec-row">
                    <div class="spec-item">
                        <span class="spec-label">Cushioning</span>
                        <span class="spec-value">Visible Air Sole</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Material</span>
                        <span class="spec-value">Premium Nubuck</span>
                    </div>
                </div>

                <div class="action-row">
                    <button class="buy-now-btn" id="explore-btn">Explore Colorway</button>
                </div>
            </div>
        </div>

     
        <div class="full-explore-panel" id="explore-panel">
            <div class="panel-header-inner">
                <button class="close-panel-btn" id="back-btn">✕ Close Profile</button>
            </div>
            
            <div class="panel-content-body">
                <h2 id="profile-title">Colorway Profile</h2>
                
                <div class="profile-section">
                    <h4>Design Heritage</h4>
                    <p id="profile-history">...</p>
                </div>
                
                <div class="profile-section">
                    <h4>Materials & Craftsmanship Blueprint</h4>
                    <p id="profile-materials">...</p>
                </div>

                <div class="profile-section">
                    <h4>Styling And Lookbook Guide</h4>
                    <p id="profile-styling">...</p>
                </div>

                <div class="stats-row-pills">
                    <div class="stat-pill">
                        <span class="stat-lbl">Color Code</span>
                        <span class="stat-val" id="profile-color-code">...</span>
                    </div>
                    <div class="stat-pill">
                        <span class="stat-lbl">Architect</span>
                        <span class="stat-val">Tinker Hatfield</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="js.js"></script>
</body>
</html>
